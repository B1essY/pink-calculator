<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CALC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar">
  <div class="controls">
    <button class="icon-btn" id="historyBtn" title="View History">📋</button>
    <button class="icon-btn" id="shareBtn" title="Share">📤</button>
    <button class="icon-btn" id="soundToggle" title="Toggle Sound">🔊</button>
    <button class="icon-btn" id="themeToggle" title="Toggle Dark Mode">🌙</button>
  </div>
</div>

<div class="main-container">
  <div class="calculator">
    <input type="text" id="display" disabled placeholder="0">

    <div class="buttons">
      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button onclick="append('/')" class="operator">÷</button>
      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button onclick="append('*')" class="operator">×</button>
      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button onclick="append('-')" class="operator">−</button>
      <button onclick="append('0')">0</button>
      <button onclick="append('.')">.</button>
      <button class="equals" onclick="calculate()">=</button>
      <button onclick="append('+')" class="operator">+</button>
      <button class="clear" onclick="clearDisplay()">C</button>
    </div>
  </div>

  <div class="history-panel" id="historyPanel">
    <div class="history-header">
      <h2>History</h2>
      <button class="clear-history" onclick="clearHistory()">🗑️ Clear</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<div class="share-modal" id="shareModal">
  <div class="share-content">
    <span class="close" onclick="closeShareModal()">&times;</span>
    <h2>Share Calculator for Baddies</h2>
    <p>Check out this viral calculator!</p>
    <div class="share-buttons">
      <a href="https://twitter.com/intent/tweet?text=Check%20out%20Calculator%20for%20Baddies!%20%F0%9F%A7%AE%E2%9C%A8%20https%3A%2F%2Fbridge-e0267.web.app" target="_blank" class="share-btn twitter">𝕱</a>
      <a href="https://www.facebook.com/sharer/sharer.php?u=https://bridge-e0267.web.app" target="_blank" class="share-btn facebook">f</a>
      <button class="share-btn copy" onclick="copyLink()">📋 Copy Link</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
